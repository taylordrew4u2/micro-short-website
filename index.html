<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Oh Shit, Did We Just Kill a Guy?</title>
<meta name="description" content="A micro short film created by Taylor Drew, directed by Oscar Monroy." />
<meta property="og:title" content="Oh Shit, Did We Just Kill a Guy?" />
<meta property="og:description" content="A micro short film created by Taylor Drew, directed by Oscar Monroy." />
<meta property="og:type" content="video.movie" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --fg:#f3efe7;
    --fg-dim:rgba(243,239,231,0.72);
    --rule:rgba(243,239,231,0.22);
  }

  *{box-sizing:border-box}
  html,body{
    margin:0;padding:0;height:100%;
    background:#000;color:var(--fg);
    font-family:Oswald,system-ui,sans-serif;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none}
  img{display:block}

  /* ---------- Stage (full-bleed background still) ---------- */
  .stage{position:fixed;inset:0;background:#000;overflow:hidden}
  .still{
    position:absolute;inset:0;
    background-size:cover;background-position:center;
    opacity:0;transition:opacity 700ms ease;
    will-change:opacity;
  }
  .still.is-active{opacity:1}
  .stage::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:
      linear-gradient(180deg,
        rgba(0,0,0,0.55) 0%,
        rgba(0,0,0,0.18) 30%,
        rgba(0,0,0,0.18) 60%,
        rgba(0,0,0,0.62) 100%),
      radial-gradient(ellipse at center,
        transparent 0%,
        transparent 50%,
        rgba(0,0,0,0.42) 100%);
  }

  /* ---------- Top nav ---------- */
  .nav{
    position:absolute;top:0;left:0;right:0;z-index:5;
    display:flex;justify-content:center;
    border-bottom:1px solid var(--rule);
  }
  .nav-inner{
    display:flex;align-items:center;justify-content:center;
    gap:0;
    width:100%;max-width:980px;
    padding:18px 24px;
  }
  .nav a{
    font-family:Oswald,sans-serif;
    font-size:12.5px;font-weight:500;
    letter-spacing:0.32em;text-transform:uppercase;
    color:var(--fg-dim);
    padding:6px 18px;
    border-bottom:1px solid transparent;
    transition:color 160ms ease, border-color 160ms ease;
    white-space:nowrap;
  }
  .nav a:hover{color:var(--fg)}
  .nav a.is-active{color:var(--fg);border-bottom-color:var(--fg)}
  .nav .sep{
    width:1px;height:11px;background:var(--rule);
    flex:none;
  }

  @media (max-width:720px){
    .nav .sep{display:none}
  }
  @media (max-width:540px){
    .nav-inner{justify-content:flex-start;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .nav-inner::-webkit-scrollbar{display:none}
    .nav-inner{scrollbar-width:none}
  }

  /* ---------- Centered content ---------- */
  .center{
    position:absolute;inset:0;z-index:3;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;
    padding:70px 24px 140px;
  }

  .eyebrow{
    font-family:Oswald,sans-serif;font-style:italic;
    font-size:14px;font-weight:400;
    letter-spacing:0.18em;text-transform:lowercase;
    color:var(--fg-dim);
    margin:0 0 18px;
  }

  .title{
    font-family:Anton,sans-serif;font-weight:400;
    font-size:clamp(28px,5.4vw,86px);
    line-height:1;letter-spacing:0.005em;
    text-transform:uppercase;
    color:var(--fg);
    text-shadow:0 2px 28px rgba(0,0,0,0.65);
    margin:0;
    white-space:nowrap;
  }

  .subtitle{
    font-family:Oswald,sans-serif;font-weight:400;
    font-size:clamp(13px,1.2vw,16px);
    letter-spacing:0.36em;text-transform:uppercase;
    color:var(--fg-dim);
    margin:36px 0 0;
  }

  /* Page-specific content slot (under subtitle) */
  .slot{margin-top:36px;width:100%;max-width:760px}

  /* Roster (Cast / Crew) */
  .roster{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:0 56px;
  }
  .roster .row{
    display:flex;justify-content:space-between;align-items:baseline;
    padding:6px 0;
    border-bottom:1px solid rgba(243,239,231,0.10);
    gap:18px;
  }
  .roster .role{
    font-style:italic;font-weight:300;
    color:var(--fg-dim);
  }
  .roster .name{
    font-size:0.92em;font-weight:500;
    letter-spacing:0.12em;text-transform:uppercase;
    color:var(--fg);
  }

  /* Contact link */
  .contact-link{
    display:inline-block;
    font-size:clamp(15px,1.3vw,19px);
    color:var(--fg);
    border-bottom:1px solid var(--rule);
    padding-bottom:4px;
    transition:border-color 160ms ease;
  }
  .contact-link:hover{border-bottom-color:var(--fg)}

  /* ---------- Laurels row (default) ---------- */
  .laurels{
    position:absolute;left:0;right:0;bottom:56px;z-index:4;
    display:flex;flex-wrap:wrap;justify-content:center;align-items:flex-end;
    gap:clamp(14px,2.6vw,36px);
    padding:0 32px;
  }
  .laurels a{
    display:inline-flex;
    transition:transform 200ms ease, opacity 200ms ease;
    opacity:0.95;
  }
  .laurels a:hover{opacity:1;transform:translateY(-2px)}
  .laurels img{
    height:clamp(54px,7.2vh,84px);
    width:auto;
  }

  /* ---------- Footer ---------- */
  .foot{
    position:absolute;left:0;right:0;bottom:18px;z-index:4;
    text-align:center;
    font-family:Oswald,sans-serif;font-style:italic;font-weight:400;
    font-size:11px;letter-spacing:0.28em;text-transform:uppercase;
    color:rgba(243,239,231,0.55);
  }

  /* ---------- Mobile title wrapping ---------- */
  @media (max-width:900px){
    .title{
      white-space:normal;
      font-size:clamp(32px,8vw,64px);
      max-width:18ch;
    }
  }

  /* ---------- Roster on mobile ---------- */
  @media (max-width:760px){
    .roster{grid-template-columns:1fr;gap:0}
  }

  /* ---------- Awards page (unique layout) ---------- */
  body[data-page="awards"] .center{
    justify-content:flex-start;
    padding-top:70px;
  }
  body[data-page="awards"] .title{
    font-size:clamp(16px,2vw,24px);
    white-space:nowrap;
  }
  body[data-page="awards"] .eyebrow{font-size:10px}
  body[data-page="awards"] .subtitle{display:none}
  body[data-page="awards"] .foot{display:none}
  body[data-page="awards"] .slot{display:none}

  body[data-page="awards"] .laurels{
    top:140px;bottom:36px;
    left:0;right:0;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-auto-rows:auto;
    gap:clamp(10px,2vw,32px);
    padding:0 clamp(32px,6vw,120px);
    align-items:center;justify-items:center;
    flex-wrap:initial;
  }
  body[data-page="awards"] .laurels a{
    width:100%;
    display:flex;justify-content:center;align-items:center;
  }
  body[data-page="awards"] .laurels img{
    width:100%;
    max-width:200px;
    height:auto;
    object-fit:contain;
  }

  @media (max-width:760px){
    body[data-page="awards"] .laurels{
      top:120px;
      gap:8px;
      padding:0 14px;
    }
    body[data-page="awards"] .laurels img{max-width:140px}
  }
</style>
</head>
<body data-page="home">

<div class="stage" id="stage" aria-hidden="true">
  <div class="still" data-page="home"    style="background-image:url('stills/still-home.png')"></div>
  <div class="still" data-page="cast"    style="background-image:url('stills/still-cast.png')"></div>
  <div class="still" data-page="crew"    style="background-image:url('stills/still-crew.png')"></div>
  <div class="still" data-page="awards"  style="background-image:url('stills/still-awards.png')"></div>
  <div class="still" data-page="contact" style="background-image:url('stills/still-contact.png')"></div>
</div>

<nav class="nav" aria-label="Primary">
  <div class="nav-inner" id="navInner">
    <a href="#home"    data-page="home">Film</a>
    <span class="sep" aria-hidden="true"></span>
    <a href="#cast"    data-page="cast">Cast</a>
    <span class="sep" aria-hidden="true"></span>
    <a href="#crew"    data-page="crew">Crew</a>
    <span class="sep" aria-hidden="true"></span>
    <a href="#awards"  data-page="awards">Awards</a>
    <span class="sep" aria-hidden="true"></span>
    <a href="#contact" data-page="contact">Contact</a>
  </div>
</nav>

<main class="center">
  <p class="eyebrow"   id="eyebrow">a micro short</p>
  <h1 class="title">Oh Shit, Did We Just Kill a Guy?</h1>
  <p class="subtitle"  id="subtitle"></p>
  <div class="slot"    id="slot"></div>
</main>

<div class="laurels" id="laurels" aria-label="Festival laurels"></div>

<p class="foot">Created by Taylor Drew &middot; Directed by Oscar Monroy &middot; 2026</p>

<script>
  const PAGES = ["home", "cast", "crew", "awards", "contact"];

  const PAGE_DATA = {
    home: {
      eyebrow: "a micro short",
      subtitle: "",
      slot: ""
    },
    cast: {
      eyebrow: "the cast",
      subtitle: "Cast",
      slot: rosterHTML([
        ["Starring",  "Taylor Drew"],
        ["Starring",  "Adiel Kay"],
        ["Featuring", "Evan Kash"]
      ])
    },
    crew: {
      eyebrow: "the crew",
      subtitle: "Crew",
      slot: rosterHTML([
        ["Created by",              "Taylor Drew"],
        ["Directed by",              "Oscar Monroy"],
        ["Director of Photography",  "Mike Cerisano"],
        ["Costume Design",           "Taylor Drew"],
        ["Asst. Camera & Grip",      "Miguel Dusauzay"],
        ["Music",                    "Jared Bailey"]
      ])
    },
    awards: {
      eyebrow: "selections & awards",
      subtitle: "Awards",
      slot: ""
    },
    contact: {
      eyebrow: "for press & bookings",
      subtitle: "Contact",
      slot: `<a class="contact-link" href="https://filmfreeway.com/TaylorDrew" target="_blank" rel="noopener">filmfreeway.com/TaylorDrew</a>`
    }
  };

  const LAURELS = [
    { file: "altff-winner.png",                alt: "AltFF — Winner, Best Writer (Super Short, Spring 2026)", url: "https://filmfreeway.com/AltFFAlternativeFilmFestival" },
    { file: "jersey-devil.png",                alt: "The Jersey Devil Film Festival — Official Selection",    url: "https://filmfreeway.com/TheJerseyDevilFilmFestival" },
    { file: "lic-best-micro-short.png",        alt: "Long Island Cinema Festival — Best Micro Short 2026",    url: "https://filmfreeway.com/LongIslandCinemaFestival" },
    { file: "altff-director.png",              alt: "AltFF — Best Director Nominee 2026",                     url: "https://filmfreeway.com/AltFFAlternativeFilmFestival" },
    { file: "altff-selection.png",             alt: "AltFF — Official Selection 2026",                        url: "https://filmfreeway.com/AltFFAlternativeFilmFestival" },
    { file: "east-village.png",                alt: "East Village New York Film Festival — Official Selection 2026", url: "https://filmfreeway.com/EastVillageNewYorkFilmFestival" },
    { file: "giggle-shitz.png",                alt: "Giggle Shitz Film Festival — Official Selection",        url: "https://filmfreeway.com/GiggleShitzFilmFestival" },
    { file: "lic-cinematographer.png",         alt: "Long Island Cinema Festival — Best Cinematographer 2026", url: "https://filmfreeway.com/LongIslandCinemaFestival" },
    { file: "lic-micro-short-nominee.png",     alt: "Long Island Cinema Festival — Best Micro Short Nominee 2026", url: "https://filmfreeway.com/LongIslandCinemaFestival" },
    { file: "lic-official-selection.png",      alt: "Long Island Cinema Festival — Official Selection 2026",  url: "https://filmfreeway.com/LongIslandCinemaFestival" }
  ];

  function rosterHTML(rows) {
    return `<div class="roster">${
      rows.map(([role, name]) => `
        <div class="row">
          <span class="role">${role}</span>
          <span class="name">${name}</span>
        </div>`).join("")
    }</div>`;
  }

  function renderLaurels() {
    const el = document.getElementById("laurels");
    el.innerHTML = LAURELS.map(l => `
      <a href="${l.url}" target="_blank" rel="noopener">
        <img src="laurels/${l.file}" alt="${l.alt}" loading="lazy" />
      </a>
    `).join("");
  }

  function setPage(page) {
    if (!PAGES.includes(page)) page = "home";

    document.body.dataset.page = page;

    // Active nav link
    document.querySelectorAll("#navInner a").forEach(a => {
      a.classList.toggle("is-active", a.dataset.page === page);
    });

    // Background still cross-fade
    document.querySelectorAll(".still").forEach(s => {
      s.classList.toggle("is-active", s.dataset.page === page);
    });

    // Page content
    const data = PAGE_DATA[page];
    document.getElementById("eyebrow").textContent  = data.eyebrow || "";
    document.getElementById("subtitle").textContent = data.subtitle || "";
    document.getElementById("slot").innerHTML       = data.slot || "";
  }

  function pageFromHash() {
    const h = (location.hash || "#home").replace(/^#/, "");
    return PAGES.includes(h) ? h : "home";
  }

  function go(delta) {
    const i = PAGES.indexOf(pageFromHash());
    const next = PAGES[(i + delta + PAGES.length) % PAGES.length];
    location.hash = "#" + next;
  }

  window.addEventListener("hashchange", () => setPage(pageFromHash()));
  window.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") { e.preventDefault(); go(+1); }
    if (e.key === "ArrowLeft")  { e.preventDefault(); go(-1); }
  });

  renderLaurels();
  if (!location.hash) location.replace("#home");
  setPage(pageFromHash());
</script>
</body>
</html>
